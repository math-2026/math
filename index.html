<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小学数学练习</title>
<style>
:root{--p:#4A90D9;--pl:#E8F0FE;--ok:#2ECC71;--okb:#E8F8F0;--no:#E74C3C;--nob:#FDEDEC;--gd:#F39C12;--tx:#2C3E50;--tl:#7F8C8D;--bg:#F5F7FA;--cd:#FFF;--sh:0 2px 12px rgba(0,0,0,.08);--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-text-size-adjust:100%}
.hd{background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;padding:14px 20px;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(74,144,217,.3)}
.hd-t{font-size:20px;font-weight:700}
.hd-r{display:flex;align-items:center;gap:14px}
.hd-tm{font-size:13px;opacity:.9}
.hd-sc{background:rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:14px;font-weight:500}
.hd-sc b{font-size:20px;margin-left:3px}
.ct{max-width:900px;margin:0 auto;padding:20px 16px 120px}
.wc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;animation:fi .6s ease}
.wc-ico{font-size:72px;margin-bottom:20px;animation:bo 2s infinite}
.wc h2{font-size:26px;margin-bottom:10px}
.wc p{font-size:15px;color:var(--tl);margin-bottom:36px;line-height:1.8}
.btn{border:none;border-radius:var(--r);padding:13px 36px;font-size:17px;font-weight:600;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,#4A90D9,#357ABD);color:#fff;box-shadow:0 4px 15px rgba(74,144,217,.4)}
.bs{background:linear-gradient(135deg,#2ECC71,#27AE60);color:#fff;box-shadow:0 4px 15px rgba(46,204,113,.4)}
.bo{background:var(--cd);color:var(--p);border:2px solid var(--p)}
.se{display:none;animation:fi .4s ease}
.se.on{display:block}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 0;border-bottom:2px solid var(--pl)}
.st{font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.sb{background:var(--p);color:#fff;font-size:12px;padding:2px 9px;border-radius:12px;font-weight:500}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
@media(max-width:600px){.cg{grid-template-columns:1fr}}
.ci{background:var(--cd);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);transition:.3s;gap:6px}
.ci.ok{background:var(--okb);border-left:4px solid var(--ok)}
.ci.no{background:var(--nob);border-left:4px solid var(--no)}
.cno{font-size:14px;font-weight:600;color:var(--tl);min-width:22px;flex-shrink:0}
.cq{font-size:18px;font-weight:600;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.ciw{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.ceq{font-size:18px;font-weight:600;color:var(--tl)}
.ci input{width:68px;height:40px;border:2px solid #E0E0E0;border-radius:var(--rs);text-align:center;font-size:19px;font-weight:600;outline:none;transition:.3s;background:#FAFAFA;font-variant-numeric:tabular-nums;-webkit-appearance:none;appearance:none;-moz-appearance:textfield}
.ci input::-webkit-inner-spin-button,.ci input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;display:none}
.ci input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(74,144,217,.15)}
.ci input.ok{border-color:var(--ok);background:var(--okb);color:var(--ok)}
.ci input.no{border-color:var(--no);background:var(--nob);color:var(--no);text-decoration:line-through}
.cic{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.wc-card{background:var(--cd);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh);transition:.3s}
.wc-card.ok{background:var(--okb);border-left:4px solid var(--ok)}
.wc-card.no{background:var(--nob);border-left:4px solid var(--no)}
.wn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--p);color:#fff;border-radius:50%;font-size:13px;font-weight:700;margin-bottom:8px}
.wd{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:500;vertical-align:middle;background:#FFF3CD;color:#856404}
.wqt{font-size:16px;line-height:1.9;margin-bottom:14px;padding-left:3px}
.wia{display:flex;align-items:center;gap:8px;padding-left:3px}
.wl{font-size:14px;color:var(--tl);font-weight:500;white-space:nowrap}
.wia input{width:96px;height:42px;border:2px solid #E0E0E0;border-radius:var(--rs);text-align:center;font-size:19px;font-weight:600;outline:none;transition:.3s;background:#FAFAFA;-webkit-appearance:none;appearance:none;-moz-appearance:textfield}
.wia input::-webkit-inner-spin-button,.wia input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;display:none}
.wia input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(74,144,217,.15)}
.wia input.ok{border-color:var(--ok);background:var(--okb);color:var(--ok)}
.wia input.no{border-color:var(--no);background:var(--nob);color:var(--no);text-decoration:line-through}
.wfb{font-size:13px;margin-top:6px;padding-left:3px;font-weight:500}
.wfb.ok{color:var(--ok)}.wfb.no{color:var(--no)}
.bb{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:11px 16px;display:none;justify-content:center;gap:12px;box-shadow:0 -2px 20px rgba(0,0,0,.08);z-index:100;padding-bottom:max(11px,env(safe-area-inset-bottom))}
.bb.on{display:flex}
.bb .btn{padding:11px 28px;font-size:15px}
.rp{display:none;background:var(--cd);border-radius:var(--r);padding:26px;margin:20px 0;box-shadow:var(--sh-lg,0 8px 30px rgba(0,0,0,.12));text-align:center;animation:su .4s ease}
.rp.on{display:block}
.rsc{font-size:52px;font-weight:800;background:linear-gradient(135deg,#4A90D9,#2ECC71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:6px 0}
.rl{font-size:14px;color:var(--tl);margin-bottom:2px}
.rst{display:flex;justify-content:center;gap:30px;margin:18px 0;padding:14px 0;border-top:1px solid #EEE;border-bottom:1px solid #EEE}
.rst-i{text-align:center}
.rst-n{font-size:24px;font-weight:700}
.rst-n.g{color:var(--ok)}.rst-n.r{color:var(--no)}.rst-n.b{color:var(--p)}
.rst-l{font-size:12px;color:var(--tl);margin-top:2px}
.rm{font-size:17px;font-weight:600;margin:14px 0;line-height:1.6}
.rm.ex{color:var(--gd)}.rm.gd{color:var(--ok)}.rm.ta{color:var(--p)}
.bg{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;top:-10px;width:12px;height:12px;opacity:0}
@keyframes cff{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.3)}}
@keyframes cfs{0%,100%{margin-left:0}25%{margin-left:30px}75%{margin-left:-30px}}
.fw{position:fixed;pointer-events:none;z-index:9998}
.fwp{position:absolute;width:6px;height:6px;border-radius:50%}
@keyframes fwb{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.tpa{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:96px;z-index:10000;pointer-events:none;animation:tpp 1.5s ease forwards}
@keyframes tpp{0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg)}50%{transform:translate(-50%,-50%) scale(1.2) rotate(5deg)}70%{transform:translate(-50%,-50%) scale(.95) rotate(-3deg)}85%{transform:translate(-50%,-50%) scale(1.05) rotate(1deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:0}}
.pb{height:4px;background:#E0E0E0;border-radius:2px;margin-bottom:18px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--p),#357ABD);border-radius:2px;transition:width .3s;width:0%}
.hp{display:none;background:var(--cd);border-radius:var(--r);padding:18px;margin-top:18px;box-shadow:var(--sh)}
.hp.on{display:block;animation:fi .3s ease}
.hi{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0F0}
.hi:last-child{border-bottom:none}
.hd-dt{font-size:13px;color:var(--tl)}
.hd-sb{padding:3px 12px;border-radius:14px;font-size:14px;font-weight:600}
.hd-sb.h{background:var(--okb);color:var(--ok)}.hd-sb.m{background:var(--pl);color:var(--p)}.hd-sb.l{background:var(--nob);color:var(--no)}
/* 确认对话框 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.on{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:28px 24px 20px;max-width:320px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:su .3s ease}
.modal-box p{font-size:16px;line-height:1.6;margin-bottom:22px;color:var(--tx)}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns .btn{padding:10px 24px;font-size:15px}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes bo{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@media print{.hd,.bb,.bg,.rp,.cfc{display:none!important}.ci input,.wia input{border:none;border-bottom:1px solid #333}.ct{padding:0}}
</style>
</head>
<body>

<div class="hd" id="header">
  <div class="hd-t">📐 小学数学练习</div>
  <div class="hd-r">
    <div class="hd-tm">⏱️ <span id="timerText">00:00</span></div>
    <div class="hd-sc">得分：<b id="headerScore">0</b><small style="font-size:11px;opacity:.8">分</small></div>
  </div>
</div>

<div class="ct">
  <div class="wc se on" id="welcomeSection">
    <div class="wc-ico">📐</div>
    <h2>小学数学练习</h2>
    <p>每次生成一套练习卷<br>含 <strong>47题</strong> 口算题 + <strong>3题</strong> 应用题<br>满分 <strong>100分</strong>，加油拿高分！</p>
    <button class="btn bp" id="startBtn" style="font-size:19px;padding:15px 44px">📝 开始出题</button>
    <div id="historyPanel" class="hp" style="max-width:380px;margin:22px auto 0"></div>
  </div>

  <div class="se" id="examSection">
    <div class="pb"><div class="pf" id="progressFill"></div></div>
    <div class="sh">
      <div class="st">一、口算题 <span class="sb">每题1分，共47分</span></div>
    </div>
    <div class="cg" id="calcGrid"></div>
    <div class="sh">
      <div class="st">二、应用题 <span class="sb">共53分</span></div>
    </div>
    <div id="wordArea"></div>
  </div>

  <div class="rp" id="resultPanel">
    <div class="rl">本次得分</div>
    <div class="rsc" id="resultScore">0</div>
    <div class="rst">
      <div class="rst-i"><div class="rst-n g" id="resultCorrect">0</div><div class="rst-l">答对题数</div></div>
      <div class="rst-i"><div class="rst-n r" id="resultWrong">0</div><div class="rst-l">答错题数</div></div>
      <div class="rst-i"><div class="rst-n b" id="resultTime">0:00</div><div class="rst-l">用时</div></div>
    </div>
    <div class="rm" id="resultMessage"></div>
    <div class="bg" id="resultButtons"></div>
  </div>
</div>

<div class="bb" id="bottomBar">
  <button class="btn bs" id="submitBtn">✅ 提交答卷</button>
  <button class="btn bo" id="resetBtn">🔄 重新出题</button>
</div>

<div class="cfc" id="confettiContainer"></div>

<!-- 确认对话框 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <p id="confirmMsg"></p>
    <div class="modal-btns">
      <button class="btn bo" id="confirmNo">取消</button>
      <button class="btn bp" id="confirmYes">确定提交</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ========== 状态 ==========
var calcQ = [], wordQ = [], submitted = false, timerID = null, startT = 0, elapsed = 0;

// ========== DOM引用 ==========
var $ = function(id){ return document.getElementById(id); };
var startBtn = $('startBtn');
var submitBtn = $('submitBtn');
var resetBtn = $('resetBtn');
var header = $('header');
var bottomBar = $('bottomBar');
var resultPanel = $('resultPanel');
var welcomeSection = $('welcomeSection');
var examSection = $('examSection');
var calcGrid = $('calcGrid');
var wordArea = $('wordArea');
var progressFill = $('progressFill');
var headerScore = $('headerScore');
var timerText = $('timerText');
var confirmModal = $('confirmModal');
var confirmMsg = $('confirmMsg');
var confirmYes = $('confirmYes');
var confirmNo = $('confirmNo');
var historyPanel = $('historyPanel');

// ========== 事件绑定 ==========
startBtn.addEventListener('click', function(e){
  e.preventDefault();
  generateExam();
});
submitBtn.addEventListener('click', function(e){
  e.preventDefault();
  submitExam();
});
resetBtn.addEventListener('click', function(e){
  e.preventDefault();
  resetExam();
});
confirmYes.addEventListener('click', function(e){
  e.preventDefault();
  confirmModal.classList.remove('on');
  doSubmit();
});
confirmNo.addEventListener('click', function(e){
  e.preventDefault();
  confirmModal.classList.remove('on');
});

// ========== 工具 ==========
function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(arr){ for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }
function fmtTime(s){ var m=Math.floor(s/60); return (m<10?'0':'')+m+':'+(s%60<10?'0':'')+(s%60); }

// ========== 生成口算题 ==========
function genCalc(n){
  var qs=[];
  for(var i=0;i<n;i++){
    var a,b,op,ans,txt;
    op=Math.random()<0.5?'+':'-';
    if(op==='+'){
      if(Math.random()<0.7){a=randInt(10,99);b=randInt(1,100-a);}
      else{a=randInt(1,50);b=randInt(1,100-a);}
      ans=a+b; txt=a+' + '+b+' = ';
    } else {
      if(Math.random()<0.7){a=randInt(10,100);b=randInt(1,a);}
      else{a=randInt(1,50);b=randInt(1,a);}
      ans=a-b; txt=a+' − '+b+' = ';
    }
    qs.push({a:a,b:b,op:op,answer:ans,text:txt});
  }
  return qs;
}

// ========== 应用题库 ==========
function getWordPool(){
  return [
    function(){var a=randInt(5,30),b=randInt(3,20);return{text:'学校图书馆有故事书'+a+'本，今天又买来了'+b+'本。现在一共有多少本故事书？',answer:a+b,unit:'本',hard:false};},
    function(){var a=randInt(20,50),b=randInt(5,a-1);return{text:'停车场原来有'+a+'辆汽车，开走了'+b+'辆。停车场现在还有多少辆汽车？',answer:a-b,unit:'辆',hard:false};},
    function(){var a=randInt(3,9),b=randInt(3,9);return{text:'一年级有男生'+(a*5)+'人，女生'+(b*5)+'人。一年级一共有多少人？',answer:a*5+b*5,unit:'人',hard:false};},
    function(){var a=randInt(15,40),b=randInt(5,a);return{text:'果园里有苹果树'+a+'棵，梨树比苹果树少'+b+'棵。梨树有多少棵？',answer:a-b,unit:'棵',hard:false};},
    function(){var a=randInt(6,20),b=randInt(6,20);return{text:'小明看一本书，第一天看了'+a+'页，第二天看了'+b+'页。两天一共看了多少页？',answer:a+b,unit:'页',hard:false};},
    function(){var a=randInt(30,60),b=randInt(10,25);return{text:'水果店有苹果'+a+'个，卖出'+b+'个后，还剩多少个苹果？',answer:a-b,unit:'个',hard:false};},
    function(){var a=randInt(10,30),b=randInt(10,30),c=randInt(1,15);return{text:'花园里有红花'+a+'朵，黄花'+b+'朵，被摘走了'+c+'朵。花园里现在还有多少朵花？',answer:a+b-c,unit:'朵',hard:false};},
    function(){var a=randInt(15,40),b=randInt(5,a-2);return{text:'小华有'+a+'颗糖，给了小丽'+b+'颗后，小华还剩多少颗糖？',answer:a-b,unit:'颗',hard:false};},
    // 提高题
    function(){var a=randInt(8,25),b=randInt(5,15),c=randInt(3,10);return{text:'文具店有铅笔'+a+'支，钢笔'+b+'支，卖出了'+c+'支铅笔后，店里一共还剩多少支笔？',answer:a-c+b,unit:'支',hard:true};},
    function(){var a=randInt(12,30),b=randInt(5,12),c=randInt(3,10);return{text:'树上原来有'+a+'只鸟，飞走了'+b+'只，又飞来了'+c+'只。树上现在有多少只鸟？',answer:a-b+c,unit:'只',hard:true};},
    function(){var a=randInt(5,15),b=randInt(5,15);return{text:'妈妈买了'+a+'个苹果和'+b+'个梨，爸爸又买了同样多的苹果。他们一共买了多少个水果？',answer:a*2+b,unit:'个',hard:true};},
    function(){var a=randInt(20,50),b=randInt(8,20),c=randInt(5,15);return{text:'停车场有'+a+'辆车。先开走了'+b+'辆，又开走了'+c+'辆。停车场现在还有多少辆车？',answer:a-b-c,unit:'辆',hard:true};},
    function(){var a=randInt(10,30),b=randInt(10,30),c=randInt(5,15);return{text:'小明有'+a+'张卡片，小红有'+b+'张卡片。小红送给小明'+c+'张后，小明现在有多少张卡片？',answer:a+c,unit:'张',hard:true};},
    function(){var a=randInt(15,35),b=randInt(10,20);return{text:'篮子里有'+a+'个鸡蛋，王奶奶拿走了'+b+'个去做蛋糕，后来她又放回去了7个。篮子里现在有多少个鸡蛋？',answer:a-b+7,unit:'个',hard:true};}
  ];
}

function genWord(){
  var pool=getWordPool();
  var easy=[], hard=[];
  for(var i=0;i<pool.length;i++){
    var r=pool[i]();
    if(r.hard) hard.push(pool[i]); else easy.push(pool[i]);
  }
  var qs=shuffle(easy.map(function(f){return f;}));
  var qh=shuffle(hard.map(function(f){return f;}));
  var result=[qs[0](),qs[1](),qh[0]()];
  result[0].score=15; result[1].score=15; result[2].score=23; result[2].hard=true;
  return result;
}

// ========== 生成试卷 ==========
function generateExam(){
  try{
    calcQ=genCalc(47);
    wordQ=genWord();
    submitted=false;
    renderCalc();
    renderWord();
    showSection('examSection');
    header.style.display='flex';
    bottomBar.classList.add('on');
    resultPanel.classList.remove('on');
    updateProgress();
    startTimer();
    submitBtn.disabled=false;
    submitBtn.textContent='✅ 提交答卷';
    window.scrollTo({top:0,behavior:'smooth'});
  } catch(err){
    console.error('生成试卷出错:',err);
  }
}

function renderCalc(){
  var html='';
  for(var i=0;i<calcQ.length;i++){
    var q=calcQ[i];
    html+='<div class="ci" id="ci'+i+'">'
      +'<span class="cno">'+(i+1)+'.</span>'
      +'<span class="cq">'+q.text+'</span>'
      +'<div class="ciw">'
      +'<input type="number" id="cipt'+i+'" data-i="'+i+'" inputmode="numeric" pattern="[0-9]*" aria-label="第'+(i+1)+'题答案">'

      +'</div>'
      +'<span class="cic" id="cic'+i+'"></span>'
      +'</div>';
  }
  calcGrid.innerHTML=html;
  // 绑定口算输入事件
  for(var j=0;j<calcQ.length;j++){
    (function(idx){
      var inp=$('cipt'+idx);
      inp.addEventListener('input',function(){ updateProgress(); });
      inp.addEventListener('focus',function(){ if(!submitted) this.select(); });
    })(j);
  }
}

function renderWord(){
  var html='';
  for(var i=0;i<wordQ.length;i++){
    var q=wordQ[i];
    html+='<div class="wc-card" id="wc'+i+'">'
      +'<div><span class="wn">'+(i+1)+'</span>'
      +(q.hard?'<span class="wd">⭐ 提高题</span>':'')
      +'<span class="sb" style="font-size:11px;margin-left:6px">'+q.score+'分</span></div>'
      +'<p class="wqt">'+q.text+'</p>'
      +'<div class="wia">'
      +'<span class="wl">答：</span>'
      +'<input type="number" id="wipt'+i+'" data-i="'+i+'" inputmode="numeric" pattern="[0-9]*" aria-label="应用题第'+(i+1)+'题答案">'
      +'<span class="wl">'+q.unit+'</span>'
      +'</div>'
      +'<div class="wfb" id="wfb'+i+'"></div>'
      +'</div>';
  }
  wordArea.innerHTML=html;
  for(var j=0;j<wordQ.length;j++){
    (function(idx){
      $('wipt'+idx).addEventListener('input',function(){ updateProgress(); });
    })(j);
  }
}

// ========== 进度 ==========
function updateProgress(){
  var total=50, done=0;
  for(var i=0;i<calcQ.length;i++){
    if($('cipt'+i).value.trim()!=='') done++;
  }
  for(var i=0;i<wordQ.length;i++){
    if($('wipt'+i).value.trim()!=='') done++;
  }
  progressFill.style.width=Math.round(done/total*100)+'%';
}

// ========== 提交 ==========
var pendingSubmit=false;
function submitExam(){
  if(submitted) return;
  // 检查未答题
  var un=0;
  for(var i=0;i<calcQ.length;i++){
    if($('cipt'+i).value.trim()==='') un++;
  }
  for(var i=0;i<wordQ.length;i++){
    if($('wipt'+i).value.trim()==='') un++;
  }
  if(un>0){
    confirmMsg.textContent='还有 '+un+' 道题没有作答，确定要提交吗？';
    confirmModal.classList.add('on');
    pendingSubmit=true;
  } else {
    doSubmit();
  }
}

function doSubmit(){
  submitted=true;
  stopTimer();
  var total=0, correct=0, wrong=0;
  // 评口算
  for(var i=0;i<calcQ.length;i++){
    var inp=$('cipt'+i), item=$('ci'+i), icon=$('cic'+i);
    var v=inp.value.trim();
    if(parseInt(v)===calcQ[i].answer){
      inp.classList.add('ok'); item.classList.add('ok'); icon.textContent='✅';
      total+=1; correct++;
    } else {
      inp.classList.add('no'); item.classList.add('no'); icon.textContent='❌';
      wrong++;
    }
    inp.readOnly=true;
  }
  // 评应用题
  for(var i=0;i<wordQ.length;i++){
    var q=wordQ[i];
    var inp=$('wipt'+i), card=$('wc'+i), fb=$('wfb'+i);
    var v=inp.value.trim();
    var ok=(parseInt(v)===q.answer);
    if(ok){
      inp.classList.add('ok'); card.classList.add('ok'); fb.classList.add('ok');
      fb.textContent='✅ 回答正确！+'+q.score+'分';
      total+=q.score; correct++;
    } else {
      inp.classList.add('no'); card.classList.add('no'); fb.classList.add('no');
      fb.textContent='❌ 回答错误。正确答案是 '+q.answer+q.unit;
      wrong++;
    }
    inp.readOnly=true;
  }
  animateScore(total);
  submitBtn.disabled=true;
  submitBtn.textContent='✅ 已提交';
  showResult(total,correct,wrong);
  saveHistory(total);
  if(total>=96){ setTimeout(playCelebration,600); }
}

// ========== 结果 ==========
function showResult(score,correct,wrong){
  resultPanel.classList.add('on');
  $('resultScore').textContent=score;
  $('resultCorrect').textContent=correct;
  $('resultWrong').textContent=wrong;
  $('resultTime').textContent=fmtTime(elapsed);
  var msg=$('resultMessage');
  if(score===100){msg.className='rm ex';msg.textContent='🎉 太棒了！满分！你是数学小天才！';}
  else if(score>=96){msg.className='rm ex';msg.textContent='🏆 优秀！离满分只差一点点，继续加油！';}
  else if(score>=80){msg.className='rm gd';msg.textContent='👍 不错！再接再厉，争取更高分！';}
  else if(score>=60){msg.className='rm ta';msg.textContent='💪 还可以！多练习一定能更好！';}
  else{msg.className='rm ta';msg.textContent='📖 别灰心，认真看看错题，下次一定行！';}
  $('resultButtons').innerHTML='<button class="btn bp" id="againBtn">📝 再来一套</button><button class="btn bo" id="homeBtn">🏠 返回首页</button>';
  $('againBtn').addEventListener('click',function(e){e.preventDefault();resetExam();});
  $('homeBtn').addEventListener('click',function(e){e.preventDefault();backToHome();});
  setTimeout(function(){resultPanel.scrollIntoView({behavior:'smooth',block:'center'});},200);
}

function animateScore(target){
  var cur=0, step=Math.max(1,Math.floor(target/30));
  var iv=setInterval(function(){
    cur+=step;
    if(cur>=target){cur=target;clearInterval(iv);}
    headerScore.textContent=cur;
  },30);
}

// ========== 庆祝 ==========
function playCelebration(){
  createConfetti();
  setTimeout(function(){createFirework(window.innerWidth*.3,window.innerHeight*.3);},200);
  setTimeout(function(){createFirework(window.innerWidth*.7,window.innerHeight*.4);},500);
  setTimeout(function(){createFirework(window.innerWidth*.5,window.innerHeight*.25);},800);
  setTimeout(showTrophy,300);
}

function createConfetti(){
  var c=document.getElementById('confettiContainer');
  var colors=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F39C12','#2ECC71','#E74C3C','#3498DB'];
  for(var i=0;i<80;i++){
    (function(idx){
      setTimeout(function(){
        var d=document.createElement('div');
        d.className='cf';
        var col=colors[Math.floor(Math.random()*colors.length)];
        var left=Math.random()*100;
        var sz=randInt(6,14);
        var dur=randInt(25,45)/10;
        var sway=randInt(15,30)/10;
        d.style.left=left+'%';
        d.style.width=sz+'px';
        d.style.height=sz+'px';
        d.style.backgroundColor=col;
        if(Math.random()<.33) d.style.borderRadius='50%';
        d.style.animation='cff '+dur+'s linear forwards, cfs '+sway+'s ease-in-out infinite';
        c.appendChild(d);
        setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},dur*1000+100);
      },idx*40);
    })(i);
  }
}

function createFirework(x,y){
  var fw=document.createElement('div');
  fw.className='fw';
  fw.style.left=x+'px';
  fw.style.top=y+'px';
  document.body.appendChild(fw);
  var colors=['#FF6B6B','#4ECDC4','#45B7D1','#FFEAA7','#DDA0DD','#F39C12','#2ECC71'];
  for(var i=0;i<20;i++){
    var p=document.createElement('div');
    p.className='fwp';
    var angle=(360/20)*i;
    var dist=randInt(40,100);
    var tx=Math.cos(angle*Math.PI/180)*dist;
    var ty=Math.sin(angle*Math.PI/180)*dist;
    p.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty('--tx',tx+'px');
    p.style.setProperty('--ty',ty+'px');
    p.style.animation='fwb 0.8s ease-out forwards';
    p.style.animationDelay=(Math.random()*.1)+'s';
    fw.appendChild(p);
  }
  setTimeout(function(){if(fw.parentNode)fw.parentNode.removeChild(fw);},1200);
}

function showTrophy(){
  var t=document.createElement('div');
  t.className='tpa';
  t.textContent='🏆';
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2500);
}

// ========== 计时器 ==========
function startTimer(){
  startT=Date.now(); elapsed=0; timerText.textContent='00:00';
  timerID=setInterval(function(){
    elapsed=Math.floor((Date.now()-startT)/1000);
    timerText.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){ if(timerID){clearInterval(timerID);timerID=null;} }

// ========== 历史 ==========
function saveHistory(score){
  try{
    var h=JSON.parse(localStorage.getItem('mathExamHistory')||'[]');
    h.unshift({date:new Date().toLocaleString('zh-CN'),score:score,time:fmtTime(elapsed)});
    if(h.length>20) h.pop();
    localStorage.setItem('mathExamHistory',JSON.stringify(h));
  }catch(e){}
}

function loadHistory(){
  try{
    var h=JSON.parse(localStorage.getItem('mathExamHistory')||'[]');
    if(!h.length) return;
    var html='<div style="font-size:15px;font-weight:600;margin-bottom:10px;color:var(--tx)">📊 历史成绩</div>';
    var show=h.slice(0,5);
    for(var i=0;i<show.length;i++){
      var s=show[i];
      var cls=s.score>=96?'h':s.score>=80?'m':'l';
      html+='<div class="hi"><span class="hd-dt">'+s.date+'</span><span class="hd-sb '+cls+'">'+s.score+'分 · '+s.time+'</span></div>';
    }
    historyPanel.innerHTML=html;
    historyPanel.classList.add('on');
  }catch(e){}
}

// ========== 导航 ==========
function showSection(id){
  var secs=document.querySelectorAll('.se');
  for(var i=0;i<secs.length;i++) secs[i].classList.remove('on');
  $(id).classList.add('on');
}

function resetExam(){
  stopTimer();
  resultPanel.classList.remove('on');
  generateExam();
}

function backToHome(){
  stopTimer();
  header.style.display='none';
  bottomBar.classList.remove('on');
  resultPanel.classList.remove('on');
  showSection('welcomeSection');
  headerScore.textContent='0';
  loadHistory();
}

// ========== 初始化 ==========
loadHistory();

})();
</script>
</body>
</html>
